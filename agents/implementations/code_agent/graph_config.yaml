    <recovery_instructions description="your previous plan was rejected — read this first">
    RECOVERY MODE — MISSING FILES: the previous plan did not cover all required
    files (listed in the correction message below). Produce a complete corrected plan
    from scratch that includes EVERY required file. Assume no prior step is valid —
