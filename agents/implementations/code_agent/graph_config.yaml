    $inspector_files
    </inspector_files>

    <inspector_issues description="problems found during exploration — address if relevant">
    $inspector_issues
    </inspector_issues>

    <recovery_instructions description="your previous plan caused a coder failure — read this first">
    RECOVERY MODE — CODER FAILURE: the coder could not implement one of your steps
    (the failed step and the validator's last feedback are in the correction message
    below). Produce a complete corrected plan from scratch. If the failed step's file
    was over ~150 lines, split it; if the logic was too dense, decompose it further;
