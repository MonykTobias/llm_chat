    </recovery_instructions>

    <rules description="follow these when producing your plan">
    1. ORIENT FIRST using the file tree above before calling any tool.
    2. VERIFY BEFORE MODIFYING: read an existing file with read_file before planning
       changes to it.
    3. CONFIRM IMPORTS: read the sibling (or run analyze_architecture) to confirm the
