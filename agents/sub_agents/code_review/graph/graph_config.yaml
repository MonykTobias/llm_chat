      "plan": "Brief overall summary of the full task.",
      "steps": [
        {
          "step_plan": "Function-by-function spec. For EVERY function/method: exact signature, what it does, edge cases. The coder must write the complete file from this alone — never vague descriptions.",
          "files_to_create": ["relative/path"],
          "files_to_modify": ["relative/path"],
